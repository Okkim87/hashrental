<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HashRental Miner Setup</title>
<style>body{font-family:system-ui;max-width:800px;margin:40px auto;background:#0b0b0f;color:#fff;padding:20px}label{display:block;margin-top:16px;font-weight:bold}input,textarea{width:100%;padding:10px;margin-top:6px;background:#1a1a22;color:#fff;border:1px solid #444;border-radius:6px}button{margin-top:20px;padding:12px 20px;background:#2d6cff;color:#fff;border:0;border-radius:6px}</style></head>
<body><h1>Miner Setup</h1><form id="setupForm" action="https://api.web3forms.com/submit" method="POST">
<input type="hidden" name="access_key" value="15ff358a-31fe-461c-ab43-7c9e1709496b">
<input type="hidden" name="subject" value="HashRental Miner Setup">
<label>Full Name *</label><input name="name" required>
<label>Email *</label><input type="email" name="email" required>
<label>Order ID</label><input id="order">
<label>Mining Pool</label><input id="pool">
<label>Pool URL</label><input id="poolurl">
<label>Worker Name</label><input id="worker">
<label>Worker Password</label><input id="password">
<label>Bitcoin Wallet</label><input id="wallet">
<label>Additional Notes</label><textarea id="notes"></textarea>
<textarea id="message" name="message" hidden></textarea>
<button type="submit">Submit</button></form>
<script>
document.getElementById('setupForm').addEventListener('submit',function(){
document.getElementById('message').value=
'Order ID: '+order.value+'\n\nMining Pool: '+pool.value+'\n\nPool URL: '+poolurl.value+'\n\nWorker: '+worker.value+'\n\nWorker Password: '+password.value+'\n\nBitcoin Wallet: '+wallet.value+'\n\nNotes: '+notes.value;
});
</script></body></html>
